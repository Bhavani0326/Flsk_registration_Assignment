<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>

<body>

<h2>User Registration</h2>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        Name <br>
        {{ form.name() }}
    </p>

    <p>
        Email <br>
        {{ form.email() }}
    </p>

    <p>
        Password <br>
        {{ form.password() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

</body>
</html>
